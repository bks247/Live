<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111110;
      --surface: #1a1917;
      --border:  #2a2926;
      --ink:     #f0ead8;
      --muted:   #6b6660;
      --warm:    #8b7355;
      --gold:    #c9a84c;
      --radius:  6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      cursor: default;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1000;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(17,17,16,1) 0%, rgba(17,17,16,0) 100%);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .nav-count {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── HERO HEADER ── */
    .site-header {
      padding: 9rem clamp(1.5rem, 5vw, 4rem) 4rem;
      max-width: 900px;
    }
    .site-header-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeSlide .7s .1s forwards;
    }
    .site-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
      opacity: 0;
      animation: fadeSlide .7s .2s forwards;
    }
    .site-header h1 em {
      font-style: italic;
      color: var(--warm);
    }
    .site-header-sub {
      margin-top: 1.6rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 420px;
      opacity: 0;
      animation: fadeSlide .7s .35s forwards;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RULE ── */
    .rule {
      margin: 0 clamp(1.5rem, 5vw, 4rem);
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── POSTS LAYOUT ── */
    .posts {
      padding: clamp(2.5rem, 6vw, 5rem) clamp(1.5rem, 5vw, 4rem);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
      gap: clamp(1.4rem, 3vw, 2.2rem);
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(28px);
      animation: cardUp .55s forwards;
      transition: border-color .3s;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes cardUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .card:hover { border-color: var(--warm); }
    .card:focus { outline: 2px solid var(--gold); outline-offset: 3px; }

    /* photo container */
    .card-photo-wrap {
      overflow: hidden;
      position: relative;
    }
    .card-photo {
      width: 100%; aspect-ratio: 3/2;
      object-fit: cover; display: block;
      transition: transform .55s cubic-bezier(.25,.46,.45,.94), filter .55s;
      filter: brightness(.9) saturate(.85);
    }
    .card:hover .card-photo {
      transform: scale(1.04);
      filter: brightness(1) saturate(1);
    }
    .card-photo-empty {
      width: 100%; aspect-ratio: 3/2;
      background: linear-gradient(135deg, #1e1d1b 0%, #252320 50%, #1a1917 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .card-photo-empty::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 24px,
        rgba(255,255,255,.012) 24px, rgba(255,255,255,.012) 25px
      );
    }
    .card-photo-empty-icon {
      font-size: 2.2rem; opacity: 0.18; z-index: 1;
    }

    /* shimmer line on hover */
    .card::after {
      content: '';
      position: absolute; top: 0; left: -100%; right: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transition: left .5s, right .5s;
    }
    .card:hover::after { left: 0; right: 0; }

    .card-body {
      padding: 1.4rem 1.6rem 1.8rem;
    }
    .card-number {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 3vw, 1.55rem);
      font-weight: 600;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 0.75rem;
      transition: color .2s;
    }
    .card:hover .card-title { color: #fff; }
    .card-peek {
      font-size: 0.84rem;
      line-height: 1.7;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-arrow {
      margin-top: 1.2rem;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .25s, transform .25s;
    }
    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }
    .card-arrow svg { width: 14px; height: 14px; }

    /* ── STORY PAGE ── */
    .story-page {
      position: fixed; inset: 0; z-index: 600;
      background: var(--bg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }
    .story-page.open {
      opacity: 1; transform: translateY(0);
      pointer-events: all;
    }

    /* back bar */
    .story-bar {
      position: sticky; top: 0; z-index: 10;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 58px;
      display: flex; align-items: center;
      background: rgba(17,17,16,.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem; font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex; align-items: center; gap: 7px;
      padding: 6px 0;
      transition: color .2s;
      text-transform: uppercase;
    }
    .back-btn:hover { color: var(--ink); }
    .back-btn svg { width: 16px; height: 16px; }

    /* hero image */
    .story-hero {
      position: relative;
      width: 100%;
      max-height: 60vh;
      overflow: hidden;
    }
    .story-hero-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: brightness(.85);
    }
    .story-hero-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to bottom, transparent, var(--bg));
    }

    /* content */
    .story-content {
      max-width: 700px;
      margin: 0 auto;
      padding: clamp(2.5rem, 7vw, 4rem) clamp(1.5rem, 5vw, 2.5rem) clamp(4rem, 10vw, 7rem);
    }
    .story-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 2.4rem;
    }

    /* decorative rule before body */
    .story-rule {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 2.4rem;
    }
    .story-rule span {
      display: block; height: 1px; flex: 1;
      background: var(--border);
    }
    .story-rule i {
      font-style: normal;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .story-body {
      font-size: clamp(1rem, 2.5vw, 1.08rem);
      line-height: 2;
      color: #c4bfb0;
      font-weight: 300;
    }
    .story-body p + p { margin-top: 1.5em; }
    .story-body p:first-child::first-letter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.8em;
      font-weight: 600;
      line-height: .75;
      float: left;
      margin: .06em .12em 0 0;
      color: var(--gold);
    }

    /* end mark */
    .story-end {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 1.2rem;
      color: var(--border);
      letter-spacing: 0.3em;
    }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1;
      padding: 6rem 1rem;
      text-align: center;
    }
    .empty-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 2rem;
      color: var(--ink); margin-bottom: 0.6rem;
    }
    .empty p { font-size: 0.85rem; color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .story-body p:first-child::first-letter {
        font-size: 3em;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#" id="homeLink">Field Notes</a>
    <span class="nav-count" id="navCount"></span>
  </nav>

  <!-- HEADER -->
  <header class="site-header">
    <p class="site-header-eyebrow">A personal journal</p>
    <h1>Stories &amp; <em>fragments</em><br>worth keeping</h1>
    <p class="site-header-sub">Photographs, words, and small moments — gathered here, for you to read slowly.</p>
  </header>

  <hr class="rule" />

  <!-- GRID -->
  <main class="posts" id="grid"></main>

  <footer id="footer"></footer>

  <!-- STORY PAGE -->
  <div class="story-page" id="storyPage" role="region" aria-label="Story">
    <div class="story-bar">
      <button class="back-btn" id="backBtn" aria-label="Back to stories">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        All stories
      </button>
    </div>
    <div id="storyHero"></div>
    <div class="story-content">
      <h1 class="story-title" id="storyTitle"></h1>
      <div class="story-rule"><span></span><i>✦</i><span></span></div>
      <div class="story-body" id="storyBody"></div>
      <div class="story-end">· · ·</div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    //  YOUR POSTS
    //
    //  title  — headline
    //  story  — your writing (\n\n = new paragraph)
    //  img    — "photos/file.jpg"  or  "" for none
    //
    //  Newest post first.
    // ════════════════════════════════════════════
    const POSTS = [
      {
        title: "Golden hour at the river",
        story: "The light went orange around 5:30 and everything turned soft. I sat on the bank for an hour doing nothing — just watching the current carry leaves downstream, listening to the frogs starting up in the reeds.\n\nThere's a particular quality to riverside evenings. The air cools from the water first, then the shadows stretch across the mud. Two herons stood motionless near the far bank. I kept still so they wouldn't spook.\n\nI didn't take many photos. Mostly I just watched. Sometimes that's enough — to be somewhere completely and let it happen to you without trying to capture it.",
        img: ""
      },
      {
        title: "The tea shop on 5th street",
        story: "Tucked behind a flower stall, easy to miss. The sign was small and slightly crooked. Inside: six tables, handwritten menus on yellowed card, and a radio playing something classical I couldn't name.\n\nThe owner brought tea without asking. Strong, a little smoky, served in small clay cups that warmed both hands. She'd been here 22 years, she said. Her daughter helps on weekends.\n\nI went back the next morning. And the morning after that.",
        img: ""
      },
      {
        title: "Learning to sit with uncertainty",
        story: "Some months you're just in the middle of something you can't name yet. This is one of those months.\n\nI keep starting sentences I don't finish. Starting projects, rearranging the same furniture. The uncertainty isn't bad exactly — it just sits in the room like a guest who hasn't explained why they came.\n\nA friend told me: not every chapter announces itself. Sometimes you're just living one before you know it.\n\nI think I'm in one.",
        img: ""
      }
    ];
    // ════════════════════════════════════════════

    const grid       = document.getElementById('grid');
    const storyPage  = document.getElementById('storyPage');
    const storyTitle = document.getElementById('storyTitle');
    const storyBody  = document.getElementById('storyBody');
    const storyHero  = document.getElementById('storyHero');

    // nav count
    document.getElementById('navCount').textContent =
      POSTS.length + (POSTS.length === 1 ? ' story' : ' stories');

    // footer
    document.getElementById('footer').textContent =
      '© ' + new Date().getFullYear() + '  ·  Field Notes';

    // build cards
    if (!POSTS.length) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-title">Nothing here yet.</div>
        <p>Add your first post inside the POSTS array in index.html</p>
      </div>`;
    } else {
      POSTS.forEach((post, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = (i * 0.1 + 0.05) + 's';
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', 'Read: ' + post.title);

        const num = String(i + 1).padStart(2, '0');
        const peek = post.story.split('\n\n')[0];

        card.innerHTML =
          `<div class="card-photo-wrap">` +
          (post.img
            ? `<img class="card-photo" src="${post.img}" alt="${post.title}" loading="lazy" />`
            : `<div class="card-photo-empty"><span class="card-photo-empty-icon">✦</span></div>`) +
          `</div>
          <div class="card-body">
            <div class="card-number">No. ${num}</div>
            <h2 class="card-title">${post.title}</h2>
            <p class="card-peek">${peek}</p>
            <div class="card-arrow">
              Read story
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </div>
          </div>`;

        const open = () => openStory(post);
        card.addEventListener('click', open);
        card.addEventListener('keydown', e => e.key === 'Enter' && open());
        grid.appendChild(card);
      });
    }

    function openStory(post) {
      storyTitle.textContent = post.title;
      storyBody.innerHTML = post.story
        .split('\n\n').map(p => `<p>${p}</p>`).join('');

      if (post.img) {
        storyHero.innerHTML =
          `<div class="story-hero">
             <img class="story-hero-img" src="${post.img}" alt="${post.title}" />
             <div class="story-hero-gradient"></div>
           </div>`;
      } else {
        storyHero.innerHTML = '';
      }

      storyPage.classList.add('open');
      storyPage.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeStory() {
      storyPage.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('backBtn').addEventListener('click', closeStory);
    document.getElementById('homeLink').addEventListener('click', e => {
      e.preventDefault(); closeStory();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeStory();
    });
  </script>
</body>
</html>
